# XcodeGen 工程描述。生成: xcodegen generate  (不需要 Xcode 即可生成 .xcodeproj)
# 生成后用 Xcode 打开 CCUsageWidget.xcodeproj → 选 CCUsageWidget scheme → Run
name: CCUsageWidget
options:
  bundleIdPrefix: com.ganxing.ccusage
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.4"
    CURRENT_PROJECT_VERSION: "6"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    # 个人自用：关闭沙箱，让扩展能直接只读 ~/.cc-switch/cc-switch.db
    ENABLE_APP_SANDBOX: NO

targets:
  # ── 宿主 App（承载 widget，同时提供一个迷你仪表盘窗口）──
  CCUsageWidget:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "web-panel/**"
      - path: Sources/App/web-panel
        buildPhase: resources
      - Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ganxing.ccusage.app
        CODE_SIGN_ENTITLEMENTS: Sources/App/App.entitlements
    dependencies:
      - target: UsageWidgetExtension
      - sdk: libsqlite3.tbd

  # ── WidgetKit 扩展 ──
  UsageWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - Sources/Widget
      - Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/Widget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ganxing.ccusage.app.UsageWidgetExtension
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/Widget.entitlements
    dependencies:
      - sdk: libsqlite3.tbd

  # ── 单元测试（直接把 Sources/Shared 编进来 → 同模块可见 internal，不依赖宿主 App）──
  # 全部对着临时 sqlite / 临时目录跑，不碰真实 ~/.cc-switch 与 ~/.claude/projects。
  # 运行: scripts/test.sh
  CCUsageWidgetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ganxing.ccusage.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: libsqlite3.tbd

schemes:
  CCUsageWidgetTests:
    build:
      targets:
        CCUsageWidgetTests: [test]
    test:
      targets:
        - CCUsageWidgetTests
